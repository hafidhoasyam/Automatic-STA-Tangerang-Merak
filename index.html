<!DOCTYPE html>
<html>
<head>
<title>GPS Auto STA</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body{
font-family:Arial;
text-align:center;
margin-top:50px;
}

#sta{
font-size:40px;
font-weight:bold;
color:red;
}

#dist{
font-size:20px;
}
</style>

</head>

<body>

<h2>GPS Auto Detect STA</h2>

<div id="sta">Detecting...</div>
<div id="dist"></div>

<script>

let staData=[];

fetch("sta_tm.csv")
.then(r=>r.text())
.then(text=>{
let rows=text.split("\n").slice(1);

rows.forEach(r=>{
let c=r.split(",");

if(c.length>2){
staData.push({
sta:parseFloat(c[0]),
lat:parseFloat(c[1]),
lon:parseFloat(c[2])
});
}
});
});

function distance(lat1,lon1,lat2,lon2){

let R=6371000;

let dLat=(lat2-lat1)*Math.PI/180;
let dLon=(lon2-lon1)*Math.PI/180;

let a=
Math.sin(dLat/2)*Math.sin(dLat/2)+
Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*
Math.sin(dLon/2)*Math.sin(dLon/2);

let c=2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));

return R*c;
}

function findSTA(lat,lon){

let min=999999;
let nearest="";

staData.forEach(p=>{

let d=distance(lat,lon,p.lat,p.lon);

if(d<min){
min=d;
nearest=p.sta;
}

});

document.getElementById("sta").innerHTML="STA "+nearest;
document.getElementById("dist").innerHTML="Distance "+min.toFixed(1)+" m";

}

navigator.geolocation.watchPosition(pos=>{

let lat=pos.coords.latitude;
let lon=pos.coords.longitude;

findSTA(lat,lon);

});

</script>

</body>
</html>
