<!DOCTYPE html>
<html>
<head>
<title>GPS Continuous STA</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body{
font-family:Arial;
text-align:center;
margin-top:40px;
}

#sta{
font-size:40px;
font-weight:bold;
color:#d32f2f;
}

#offset{
font-size:18px;
}

#status{
font-size:14px;
color:#555;
}
</style>

</head>

<body>

<h2>GPS Continuous STA</h2>

<div id="sta">Loading STA data...</div>
<div id="offset"></div>
<div id="status"></div>

<script>

let staData=[];

function distance(lat1,lon1,lat2,lon2){

let R=6371000;

let dLat=(lat2-lat1)*Math.PI/180;
let dLon=(lon2-lon1)*Math.PI/180;

let a=
Math.sin(dLat/2)*Math.sin(dLat/2)+
Math.cos(lat1*Math.PI/180)*
Math.cos(lat2*Math.PI/180)*
Math.sin(dLon/2)*Math.sin(dLon/2);

let c=2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));

return R*c;

}

function findSTA(lat,lon){

let min=999999;
let index=0;

staData.forEach((p,i)=>{

let d=distance(lat,lon,p.lat,p.lon);

if(d<min){
min=d;
index=i;
}

});

let p1=staData[index];
let p2=staData[index+1];

if(!p2) return;

let d1=distance(lat,lon,p1.lat,p1.lon);
let d2=distance(lat,lon,p2.lat,p2.lon);

let ratio=d1/(d1+d2);

let sta=p1.sta+(p2.sta-p1.sta)*ratio;

document.getElementById("sta").innerHTML="STA "+sta.toFixed(1);
document.getElementById("offset").innerHTML="Offset "+min.toFixed(2)+" m";

}

function startGPS(){

if(!navigator.geolocation){

document.getElementById("status").innerHTML="GPS tidak didukung browser";

return;

}

navigator.geolocation.watchPosition(

function(pos){

let lat=pos.coords.latitude;
let lon=pos.coords.longitude;

document.getElementById("status").innerHTML="GPS aktif";

findSTA(lat,lon);

},

function(err){

document.getElementById("status").innerHTML="GPS error: "+err.message;

},

{
enableHighAccuracy:true,
timeout:10000,
maximumAge:0
}

);

}

fetch("sta_tm.csv?nocache="+Date.now())
.then(r=>r.text())
.then(text=>{

let rows=text.split("\n").slice(1);

rows.forEach(r=>{

let c=r.split(",");

if(c.length>=3){

staData.push({
sta:parseFloat(c[0]),
lat:parseFloat(c[1]),
lon:parseFloat(c[2])
});

}

});

document.getElementById("sta").innerHTML="STA data loaded";
document.getElementById("status").innerHTML="Menunggu GPS...";

startGPS();

});

</script>

</body>
</html>
